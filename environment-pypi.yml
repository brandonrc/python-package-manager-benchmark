name: mlbench-conda-pypi
channels:
- conda-forge
- conda-pypi
dependencies:
- python>=3.11,<3.13
- pytorch>=2.0
- torchvision>=0.15
- numpy>=1.24
- scipy>=1.11
- pandas>=2.0
- opencv>=4.8
- scikit-learn>=1.3
- matplotlib>=3.7
- h5py>=3.9
- pillow>=10.0
- tqdm>=4.65
- jupyterlab>=4.0
- protobuf>=4.0
- pytest>=7.0
- pytest-timeout>=2.1
- pip
- transformers>=4.30
- datasets>=3.0
- wandb>=0.15
- albumentations>=1.3
- lightning>=2.0
- timm>=0.9
- onnx>=1.14
- onnxruntime>=1.15
- onnxscript>=0.1
- gradio>=4.0
- torchmetrics>=1.0
- safetensors>=0.3
- evaluate>=0.4
# smolagents is PyPI-only (not on conda-forge). Listed as a top-level dep so the
# rattler solver must satisfy it from the conda-pypi channel — i.e. fetch the
# wheel natively from PyPI. This is the dependency that actually exercises
# conda-pypi's reason for existing; every other dep here is on conda-forge.
- smolagents>=1.0
# simsimd is a transitive dep that pip auto-resolves in the conda+pip baseline
# but conda-forge resolution does not pull in implicitly. Listed explicitly so
# the conda-pypi env is functionally equivalent to the conda baseline (tests pass).
- simsimd
# NOTE: the editable install of this project (`-e .`) is intentionally NOT here.
# The conda-pypi benchmark performs it via `conda pypi install -e .` in
# post_install_cmd (the conda-pypi-recommended editable-install path).
