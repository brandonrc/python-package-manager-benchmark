name: mlbench
channels:
  - conda-forge
dependencies:
  - python>=3.11,<3.13
  - pytorch>=2.0
  - torchvision>=0.15
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0
  - opencv>=4.8
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - h5py>=3.9
  - pillow>=10.0
  - tqdm>=4.65
  - jupyterlab>=4.0
  - protobuf>=4.0
  - pytest>=7.0
  - pytest-timeout>=2.1
  - pip
  - pip:
      - transformers>=4.30
      - datasets>=3.0
      - wandb>=0.15
      - albumentations>=1.3
      - lightning>=2.0
      - timm>=0.9
      - onnx>=1.14
      - onnxruntime>=1.15
      - onnxscript>=0.1
      - gradio>=4.0
      - torchmetrics>=1.0
      - safetensors>=0.3
      - evaluate>=0.4
      # smolagents is PyPI-only (not on conda-forge). In the conda+pip baseline
      # it is installed via pip; in environment-pypi.yml it is a top-level dep so
      # conda-pypi must fetch it natively from PyPI. This is the one dependency
      # that actually exercises conda-pypi's PyPI-wheel install path.
      - smolagents>=1.0
      - -e .
