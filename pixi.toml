[workspace]
name = "mlbench"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11,<3.13"
pytorch = ">=2.0"
numpy = ">=1.24"
scipy = ">=1.11"
pandas = ">=2.0"
opencv = ">=4.8"
scikit-learn = ">=1.3"
matplotlib = ">=3.7"
h5py = ">=3.9"
pillow = ">=10.0"
tqdm = ">=4.65"
jupyterlab = ">=4.0"
protobuf = ">=4.0"
pytest = ">=7.0"
pytest-timeout = ">=2.1"

[pypi-dependencies]
transformers = ">=4.30"
datasets = ">=2.14"
wandb = ">=0.15"
albumentations = ">=1.3"
lightning = ">=2.0"
timm = ">=0.9"
onnx = ">=1.14"
onnxruntime = ">=1.15"
onnxscript = ">=0.1"
gradio = ">=4.0"
torchmetrics = ">=1.0"
safetensors = ">=0.3"
evaluate = ">=0.4"
mlbench = { path = ".", editable = true }

[tasks]
test = "pytest tests/ -v --timeout=60"
train = "python -m mlbench.train"
